# CPU-only override — sets FORCE_CPU=true for non-GPU hosts.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml \
#       -f docker-compose.cpu.yml up -d
#
# Forces the synthesis training pipeline to use CPU instead of GPU.
# Required for macOS, CI runners, and any host without an NVIDIA GPU.
services:
  app:
    environment:
      FORCE_CPU: "true"
