# CPU-only override — sets FORCE_CPU=true and adds capabilities needed
# for gosu privilege-drop on Docker Desktop (macOS/Windows).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml \
#       -f docker-compose.cpu.yml up -d
#
# On Linux with NVIDIA GPU, use docker-compose.gpu.yml instead.
services:
  app:
    cap_add:
      - IPC_LOCK
      - SETUID
      - SETGID
    environment:
      FORCE_CPU: "true"
