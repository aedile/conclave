# NetworkPolicy for the PostgreSQL pod.
#
# Ingress allowed from:
#   - pgbouncer pod only (port 5432)
#   Direct app-to-postgres connections are not permitted; all DB traffic
#   must flow through the PgBouncer connection pooler.
#
# Egress: DNS only. PostgreSQL does not initiate outbound connections.
#
# CNI requirement: Calico, Cilium, or Weave Net (NOT kubenet / VPC CNI).
# Pod label expected: app.kubernetes.io/name: postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-policy
  namespace: conclave
  labels:
    app.kubernetes.io/part-of: conclave-engine
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound connections from pgbouncer only.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pgbouncer
      ports:
        - protocol: TCP
          port: 5432
  egress:
    # Allow DNS resolution via kube-dns (UDP and TCP).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
