# NetworkPolicy for the PgBouncer connection pooler pod.
#
# Ingress allowed from:
#   - app pod (port 6432)
#
# Egress allowed to:
#   - postgres pod (port 5432)
#   - kube-dns (UDP/TCP port 53) — required for service discovery
#
# CNI requirement: Calico, Cilium, or Weave Net (NOT kubenet / VPC CNI).
# Pod label expected: app.kubernetes.io/name: pgbouncer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgbouncer-policy
  namespace: conclave
  labels:
    app.kubernetes.io/part-of: conclave-engine
    app.kubernetes.io/managed-by: kustomize
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound connections from the app pod.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: app
      ports:
        - protocol: TCP
          port: 6432
  egress:
    # Allow outbound connections to postgres.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution via kube-dns (UDP and TCP).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
