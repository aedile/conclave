repos:
  # ---------------------------------------------------------------------------
  # Security — gitleaks: detect secrets and credentials in commits
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # Security — detect-secrets: baseline-aware secret scanning
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # ---------------------------------------------------------------------------
  # Linting and formatting — ruff (replaces flake8, isort, pyupgrade)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Type checking — mypy strict mode on src/synth_engine only
  # scripts/ are excluded as they pre-date this project and are covered by bandit
  #
  # additional_dependencies must list every package imported at module scope in
  # src/synth_engine/ so that the mirrors-mypy isolated environment can resolve
  # types.  Pin versions to match pyproject.toml production dependencies.
  # Update this list whenever a new production dependency is added.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - mypy==1.19.1
          - fastapi>=0.115.0
          - starlette>=0.41.0
          - redis>=5.0.0
          - opentelemetry-sdk>=1.28.0
          - opentelemetry-instrumentation-fastapi>=0.49b0
          - opentelemetry-exporter-otlp-proto-grpc>=1.28.0
          - sqlmodel>=0.0.21
          - sqlalchemy>=2.0.0
          - cryptography>=43.0.0
          - types-cryptography
          - pydantic>=2.0.0
          - PyJWT>=2.10.0
          - passlib[bcrypt]>=1.7.4
          - prometheus-client>=0.21.0
        files: ^src/

  # ---------------------------------------------------------------------------
  # Security scanning — bandit on src/ and scripts/
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/, scripts/]
