repos:
  # ---------------------------------------------------------------------------
  # Security — gitleaks: detect secrets and credentials in commits
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # Linting and formatting — ruff (replaces flake8, isort, pyupgrade)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Type checking — mypy strict mode on src/synth_engine only
  # scripts/ are excluded as they pre-date this project and are covered by bandit
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - mypy==1.19.1
        files: ^src/

  # ---------------------------------------------------------------------------
  # Security scanning — bandit on src/ and scripts/
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
