# .github/workflows/ci.yml
#
# Continuous Integration — Conclave Engine
#
# Phase 1 CI: Full quality gates via Poetry. Runs on every push and pull
# request. Jobs are chained so a security failure short-circuits all downstream
# work.
#
# Job order: security → lint → test → {integration-test | synthesizer-integration-test | sbom | trivy-scan} (parallel)
# shellcheck runs independently (no Python deps required).
#
# Supply-chain hardening (T3.5.1): all `uses:` lines are pinned to immutable
# commit SHAs. The SHA comment shows the version tag each SHA resolves to.
# To update an action: look up the new tag's commit SHA via
#   gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq '.object.sha'
# then replace both the SHA and the version comment below.

name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "test/**"
      - "docs/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Security scan — runs first, fails fast on secrets/credential leaks
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # Required for gitleaks-action to list PR commits
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Full history required for gitleaks commit scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lint — ruff, mypy, bandit, vulture, import-linter, pip-audit
  # Runs after security to ensure no credential leaks reach expensive checks
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Verify poetry.lock is in sync with pyproject.toml
        run: poetry check --lock

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff lint
        run: poetry run ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/ scripts/

      - name: Mypy type check
        run: poetry run mypy src/

      - name: Bandit security scan
        run: poetry run bandit -c pyproject.toml -r src/ scripts/

      - name: Vulture dead code scan
        run: poetry run vulture src/ .vulture_whitelist.py

      - name: Import-linter boundary check
        run: poetry run lint-imports

      - name: pip-audit dependency vulnerability scan
        run: poetry run pip-audit

  # ---------------------------------------------------------------------------
  # Unit tests — pytest with 90% coverage gate
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit tests with coverage
        # ADV-066: Zero-warning policy enforced via pyproject.toml filterwarnings=["error", ...].
        # Adding bare -W error to CLI conflicts with the ignore suppressors that follow "error"
        # in the config (CLI -W flags override ini ignore rules). Policy is already active.
        run: >
          poetry run pytest tests/unit/
          --cov=src/synth_engine
          --cov-report=term-missing
          --cov-fail-under=90

  # ---------------------------------------------------------------------------
  # Integration tests — pytest-postgresql in pg_ctl process mode
  #
  # pytest-postgresql's proc fixtures spawn their own ephemeral pg_ctl
  # instance; a services: postgres: container conflicts with that pattern.
  # Instead we install PostgreSQL 16 via apt so pg_ctl is on PATH, then let
  # pytest-postgresql manage the lifecycle. We also pass --no-cov to avoid
  # the --cov-fail-under=90 addopt (integration-only coverage is ~15%), and
  # -p pytest_postgresql to re-enable the plugin overridden by
  # -p no:pytest_postgresql in addopts (later CLI args win).
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install PostgreSQL 16 (provides pg_ctl for pytest-postgresql)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-16 postgresql-client-16 libpq-dev
          echo "PG_BIN=/usr/lib/postgresql/16/bin" >> $GITHUB_ENV
          echo "/usr/lib/postgresql/16/bin" >> $GITHUB_PATH
      - name: Validate pg_ctl is on PATH
        run: pg_ctl --version
      - name: Install dependencies (dev + integration)
        run: poetry install --with dev,integration
      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v --tb=short --no-cov -p pytest_postgresql -m "not synthesizer"

  # ---------------------------------------------------------------------------
  # Synthesizer integration tests — real CTGAN training on Faker-generated data
  #
  # Installs the synthesizer dependency group (sdv, torch, etc.) and runs the
  # synthesizer-specific integration tests.  These tests are separated from the
  # main integration-test job because the synthesizer group is large (~1 GB) and
  # only required for synthesis tasks.
  # ---------------------------------------------------------------------------
  synthesizer-integration-test:
    name: Synthesizer Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies (dev + synthesizer)
        run: poetry install --with dev,synthesizer
      - name: Run synthesizer integration tests
        # ADV-069: Use marker-based routing instead of explicit file list.
        # New synthesizer test files will be auto-included when they carry
        # @pytest.mark.synthesizer / pytestmark = pytest.mark.synthesizer.
        run: |
          poetry run pytest tests/integration/ \
            -m synthesizer \
            -v --no-cov

  # ---------------------------------------------------------------------------
  # SBOM — generate Software Bill of Materials after tests pass
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Generate CycloneDX SBOM
        run: poetry run cyclonedx-py poetry -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Trivy scan — container image vulnerability scan
  #
  # Scans the production Docker image for HIGH and CRITICAL CVEs. Runs after
  # unit tests pass to avoid wasting build time on a broken codebase. This job
  # does NOT block integration-test or sbom — it runs in parallel with them.
  # Fails the pipeline if any HIGH or CRITICAL severity CVE is found, ensuring
  # container vulnerabilities are caught before deployment.
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build Docker image
        run: docker build -t conclave-engine:ci-scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: "conclave-engine:ci-scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"


  # ---------------------------------------------------------------------------
  # Frontend — Lint, Unit Tests (Vitest, 90% coverage), Build
  # Runs after security scan. SHA-pinned actions/setup-node@v4.4.0
  # SHA: 49933ea5288caeca8642d1e84afbd3f7d6820020
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Lint, Test, Build)
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Audit dependencies
        run: cd frontend && npm audit --audit-level=high

      - name: Type-check
        run: cd frontend && npm run type-check

      - name: Run unit tests with coverage
        run: cd frontend && npm run test:coverage

      - name: Build production bundle
        run: cd frontend && npm run build

      - name: Upload frontend build artifact
        # ADV-062: Share the built dist/ between frontend and e2e jobs so
        # the e2e job does not rebuild the frontend from scratch.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Playwright E2E tests — full synthesis workflow browser tests
  #
  # ADV-059 drain: wire Playwright E2E tests into CI.
  #
  # Runs after the `frontend` job passes (which builds the production bundle
  # and verifies unit tests). Uses the Vite preview server (already configured
  # in playwright.config.ts) to serve the built app.
  #
  # All API calls are mocked via Playwright's page.route() — the backend is
  # NOT running. This matches the pattern in dashboard.spec.ts and
  # unseal.spec.ts.
  #
  # Playwright binary: Chromium only (matches playwright.config.ts projects).
  # SHA-pinned actions: same SHAs as the `frontend` job above.
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Download frontend build artifact
        # ADV-062: Use the pre-built dist/ from the frontend job instead of
        # rebuilding — eliminates the second full frontend build per CI run.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Playwright browser binaries (Chromium only)
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Shell lint — shellcheck on all hook and script .sh files
  # Runs independently — no Python deps required
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shell Lint (shellcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run shellcheck
        run: |
          find scripts/ frontend/scripts/ .claude/hooks/ -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning

  # ---------------------------------------------------------------------------
  # Docs gate — enforces Constitution Priority 6 (Documentation currency)
  # Every PR branch must contain at least one commit beginning with "docs:"
  # If no documentation was changed, the commit message must be:
  #   docs: no documentation changes required — <one-sentence justification>
  # This gate has no Python dependencies and runs immediately on PR open.
  # ---------------------------------------------------------------------------
  docs-gate:
    name: Documentation Gate (Constitution Priority 6)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify docs commit present on PR branch
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Scanning commits from ${BASE} to ${HEAD} for docs: prefix..."
          DOCS_COMMITS=$(git log "${BASE}..${HEAD}" --format="%s" | grep -c "^docs:" || true)
          if [ "$DOCS_COMMITS" -eq 0 ]; then
            echo ""
            echo "ERROR: No 'docs:' commit found on this PR branch."
            echo ""
            echo "Constitution Priority 6 requires every PR to contain at least one"
            echo "commit beginning with 'docs:'. If no documentation changed, add:"
            echo ""
            echo "  docs: no documentation changes required — <one-sentence justification>"
            echo ""
            echo "See CONSTITUTION.md Section 4 and CLAUDE.md Rule 9."
            exit 1
          fi
          echo "Found ${DOCS_COMMITS} docs: commit(s). Constitution Priority 6: PASS."

  # ---------------------------------------------------------------------------
  # OWASP ZAP Baseline Scan — dynamic application security testing (DAST)
  #
  # Starts the Conclave Engine in SQLite mode, unseals the vault, then runs
  # the ZAP baseline scan against the live API. The baseline scan is
  # informational (fail_action: false) — findings are uploaded as an artifact
  # and visible in the Actions summary but do NOT block merge.
  #
  # Rationale for fail_action: false (P6-T6.2):
  #   The ZAP baseline scan checks for passive OWASP Top 10 issues. Because the
  #   engine runs behind TLS/nginx in production (not raw uvicorn), some ZAP
  #   findings (e.g., missing HSTS on HTTP-only CI) are CI-environment artefacts
  #   rather than real vulnerabilities. All critical findings are mitigated by
  #   CSPMiddleware, SealGate, LicenseGate, and RequestBodyLimitMiddleware.
  #   The scan runs to produce an audit trail — not as a hard gate.
  #
  # Action SHA pinning: zaproxy/action-baseline@v0.15.0
  #   SHA: de8ad967d3548d44ef623df22cf95c3b0baf8b25
  #
  # Artifact upload: handled exclusively by the zaproxy/action-baseline
  # composite action via its artifact_name parameter. A separate
  # actions/upload-artifact step is intentionally absent to avoid a duplicate
  # artifact name collision error (P6-T6.2 DevOps blocker fix).
  # ---------------------------------------------------------------------------
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Start Conclave Engine (SQLite mode, background)
        env:
          DATABASE_URL: "sqlite:///./zap_test.db"
          VAULT_SEAL_SALT: "emFwLWNpLXRlc3Qtc2FsdC1maWN0aW9uYWw="  # pragma: allowlist secret  base64("zap-ci-test-salt-fictional")
          HUEY_BACKEND: "memory"
          HUEY_IMMEDIATE: "true"
          LICENSE_KEY: "zap-ci-fictional-license"
        run: |
          poetry run uvicorn synth_engine.bootstrapper.main:app \
            --host 127.0.0.1 --port 8765 --log-level warning &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for API health check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8765/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API is up (attempt $i)."
              exit 0
            fi
            echo "Waiting for API... attempt $i (got $STATUS)"
            sleep 2
          done
          echo "ERROR: API did not become healthy within 60 seconds."
          kill $(cat /tmp/uvicorn.pid) || true
          exit 1

      - name: Unseal vault (fictional test passphrase)
        run: |
          curl -s -X POST http://127.0.0.1:8765/vault/unseal \
            -H "Content-Type: application/json" \
            -d '{"passphrase": "zap-ci-fictional-unseal-passphrase"}' \
            || true  # Unseal may fail if vault is already unsealed — not a gate

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "http://127.0.0.1:8765"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          fail_action: false
          artifact_name: "zap-baseline-report"
        continue-on-error: true

      - name: Stop background API server
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

      - name: Clean up ZAP test database
        # ADV-065: Remove zap_test.db created by DATABASE_URL=sqlite:///./zap_test.db.
        # Prevents stale test DB files accumulating on self-hosted runners.
        if: always()
        run: rm -f zap_test.db
