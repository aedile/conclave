# .github/workflows/ci.yml
#
# Continuous Integration — Conclave Engine
#
# Phase 0.6 bootstrap CI: runs the unit test suite and security scan on every
# push and pull request. This is intentionally minimal for the pre-Poetry phase.
#
# PHASE 1 UPGRADE (Task 1.1): Once pyproject.toml is initialized, replace the
# manual pip installs and python3 invocations below with:
#   poetry install --with dev
#   poetry run ruff check src/ tests/
#   poetry run mypy src/
#   poetry run pytest --cov=src/synth_engine --cov-fail-under=90
#   poetry run bandit -c pyproject.toml -r src/

name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "test/**"
      - "docs/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Security scan — runs first, fails fast on secrets/credential leaks
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for gitleaks commit scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Unit tests — pytest without coverage gate (pre-Poetry; src/ is empty)
  # Coverage gate will be enforced once pyproject.toml is introduced in Phase 1
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install test dependencies
        # Pin chromadb to match local development version.
        # Update this pin alongside any chromadb upgrade in pyproject.toml (Phase 1).
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "pytest" "chromadb==1.5.5"

      - name: Run unit tests
        run: python3 -m pytest tests/unit/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Shell lint — shellcheck on all hook and script .sh files
  # Ensures the hook infrastructure is syntactically valid across platforms
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shell Lint (shellcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find scripts/ .claude/hooks/ -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning
