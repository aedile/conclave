# .github/workflows/ci.yml
#
# Continuous Integration — Conclave Engine
#
# Phase 1 CI: Full quality gates via Poetry. Runs on every push and pull
# request. Jobs are chained so a security failure short-circuits all downstream
# work.
#
# Job order: security → lint → test → integration-test → sbom
# shellcheck runs independently (no Python deps required).

name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "test/**"
      - "docs/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Security scan — runs first, fails fast on secrets/credential leaks
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # Required for gitleaks-action to list PR commits
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for gitleaks commit scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lint — ruff, mypy, bandit, vulture, import-linter, pip-audit
  # Runs after security to ensure no credential leaks reach expensive checks
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff lint
        run: poetry run ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/ scripts/

      - name: Mypy type check
        run: poetry run mypy src/

      - name: Bandit security scan
        run: poetry run bandit -c pyproject.toml -r src/ scripts/

      - name: Vulture dead code scan
        run: poetry run vulture src/

      - name: Import-linter boundary check
        run: poetry run lint-imports

      - name: pip-audit dependency vulnerability scan
        run: poetry run pip-audit

  # ---------------------------------------------------------------------------
  # Unit tests — pytest with 90% coverage gate
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit tests with coverage
        run: >
          poetry run pytest tests/unit/
          --cov=src/synth_engine
          --cov-report=term-missing
          --cov-fail-under=90

  # ---------------------------------------------------------------------------
  # Integration tests — pytest-postgresql, real PostgreSQL service
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies (dev + integration)
        run: poetry install --with dev,integration

      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v --tb=short
        env:
          PGUSER: postgres
          PGPASSWORD: postgres
          PGHOST: localhost
          PGPORT: 5432

  # ---------------------------------------------------------------------------
  # SBOM — generate Software Bill of Materials after tests pass
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Generate CycloneDX SBOM
        run: poetry run cyclonedx-py poetry -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Shell lint — shellcheck on all hook and script .sh files
  # Runs independently — no Python deps required
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shell Lint (shellcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find scripts/ .claude/hooks/ -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning
