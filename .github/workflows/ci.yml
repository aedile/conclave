# .github/workflows/ci.yml
#
# Continuous Integration — Conclave Engine
#
# Phase 1 CI: Full quality gates via Poetry. Runs on every push and pull
# request. Jobs are chained so a security failure short-circuits all downstream
# work.
#
# Job order: security → lint → test → {integration-test | synthesizer-integration-test | sbom | trivy-scan} (parallel)
# shellcheck runs independently (no Python deps required).
#
# Supply-chain hardening (T3.5.1): all `uses:` lines are pinned to immutable
# commit SHAs. The SHA comment shows the version tag each SHA resolves to.
# To update an action: look up the new tag's commit SHA via
#   gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq '.object.sha'
# then replace both the SHA and the version comment below.
#
# Mutation testing (cosmic-ray) runs LOCALLY as a PM gate, not in CI.
# GitHub Actions shared runners cannot complete 789 mutants within a
# reasonable timeout. See ADR-0054 (amended 2026-03-24) for rationale.
# Local run: cosmic-ray init cosmic-ray.toml session.sqlite &&
#             cosmic-ray exec cosmic-ray.toml session.sqlite &&
#             python scripts/check_mutation_score.py session.sqlite

name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "test/**"
      - "docs/**"
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Change detection — determines which jobs need to run based on changed files.
  # Docs-only PRs skip expensive Python/frontend jobs (saves ~2 hours CI time).
  # Security scan and shellcheck always run regardless of changed files.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history needed for accurate diff

      - name: Check changed file paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Always run everything on pushes to main
            echo "python=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "ci=true" >> "$GITHUB_OUTPUT"
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For PRs, diff against the merge base with the target branch.
          # For pushes, diff against the previous commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Get changed files
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")

          echo "Changed files:"
          echo "$CHANGED"

          # Check categories
          PYTHON=$(echo "$CHANGED" | grep -cE '\.(py|toml|lock)$|^pyproject|^poetry' || true)
          FRONTEND=$(echo "$CHANGED" | grep -cE '^frontend/|\.tsx?$|\.css$|\.jsx?$' || true)
          CI_FILES=$(echo "$CHANGED" | grep -cE '^\.github/' || true)

          if [ "$PYTHON" -gt 0 ] || [ "$CI_FILES" -gt 0 ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$FRONTEND" -gt 0 ] || [ "$CI_FILES" -gt 0 ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          echo "ci=$( [ "$CI_FILES" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

          if [ "$PYTHON" -eq 0 ] && [ "$FRONTEND" -eq 0 ] && [ "$CI_FILES" -eq 0 ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo ">>> Docs-only change detected — skipping Python and frontend jobs"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Security scan — runs first, fails fast on secrets/credential leaks
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # Required for gitleaks-action to list PR commits
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history required for gitleaks commit scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lint — ruff, mypy, bandit, vulture, import-linter, pip-audit
  # Runs after security to ensure no credential leaks reach expensive checks
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    needs: [security, changes]
    if: needs.changes.outputs.python == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Verify poetry.lock is in sync with pyproject.toml
        run: poetry check --lock

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff lint
        run: poetry run ruff check src/ tests/ scripts/ demos/

      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/ scripts/ demos/

      - name: Mypy type check
        run: poetry run mypy src/

      - name: Bandit security scan
        run: poetry run bandit -c pyproject.toml -r src/ scripts/ demos/

      - name: Vulture dead code scan
        run: poetry run vulture src/ .vulture_whitelist.py

      - name: Import-linter boundary check
        run: poetry run lint-imports

      - name: pip-audit dependency vulnerability scan
        # CVE-2026-4539: ReDoS in pygments AdlLexer (local access only).
        # No patched version exists on PyPI as of 2026-03-24 — pygments 2.19.2
        # is both the latest and the affected release. Ignored until a fix is
        # published. Track: https://github.com/pygments/pygments/issues/2834
        run: poetry run pip-audit --ignore-vuln CVE-2026-4539

  # ---------------------------------------------------------------------------
  # Unit tests — pytest with 90% coverage gate
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.python == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit tests with coverage
        # ADV-066: Zero-warning policy enforced via pyproject.toml filterwarnings=["error", ...].
        # Adding bare -W error to CLI conflicts with the ignore suppressors that follow "error"
        # in the config (CLI -W flags override ini ignore rules). Policy is already active.
        #
        # pytest-xdist (-n auto): runs tests in parallel across all available CPU cores.
        # On ubuntu-latest (2 vCPU) this roughly halves wall-clock time.
        # --dist worksteal: dynamic work-stealing balances load across workers.
        run: >
          poetry run pytest tests/unit/
          -n auto --dist worksteal
          --cov=src/synth_engine
          --cov-report=term-missing
          --cov-fail-under=95

  # ---------------------------------------------------------------------------
  # Integration tests — pytest-postgresql in pg_ctl process mode
  #
  # pytest-postgresql's proc fixtures spawn their own ephemeral pg_ctl
  # instance; a services: postgres: container conflicts with that pattern.
  # Instead we install PostgreSQL 16 via apt so pg_ctl is on PATH, then let
  # pytest-postgresql manage the lifecycle. We also pass --no-cov to avoid
  # the --cov-fail-under=95 addopt (integration-only coverage is ~15%), and
  # -p pytest_postgresql to re-enable the plugin overridden by
  # -p no:pytest_postgresql in addopts (later CLI args win).
  #
  # T19.3: A verify_integration_count step runs BEFORE the test run.
  # If pytest --collect-only reports 0 tests, CI fails loudly rather than
  # producing a false-green from an empty test suite (e.g. PostgreSQL service
  # failure causing all tests to skip silently).
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests (Python 3.14)
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install PostgreSQL 16 (provides pg_ctl for pytest-postgresql)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-16 postgresql-client-16 libpq-dev
          echo "PG_BIN=/usr/lib/postgresql/16/bin" >> $GITHUB_ENV
          echo "/usr/lib/postgresql/16/bin" >> $GITHUB_PATH
      - name: Validate pg_ctl is on PATH
        run: pg_ctl --version
      - name: Install dependencies (dev + integration)
        run: poetry install --with dev,integration
      - name: Verify integration test count > 0 (T19.3 CI gate)
        # Fails loudly if 0 tests are collected — prevents false-green from
        # a silent skip-all when PostgreSQL is unavailable.
        run: bash scripts/verify_integration_count.sh
      - name: Run integration tests
        env:
          # P79-F12: pass-through auth requires explicit opt-in. Set here so
          # tests that rely on no JWT secret are not blocked by 401 responses.
          CONCLAVE_PASS_THROUGH_ENABLED: "true"
          CONCLAVE_ENV: "development"
        run: poetry run pytest tests/integration/ -v --tb=short --no-cov -p pytest_postgresql -m "not synthesizer"

  # ---------------------------------------------------------------------------
  # Synthesizer integration tests — real CTGAN training on Faker-generated data
  #
  # Installs the synthesizer dependency group (sdv, torch, etc.) and runs the
  # synthesizer-specific integration tests.  These tests are separated from the
  # main integration-test job because the synthesizer group is large (~1 GB) and
  # only required for synthesis tasks.
  # ---------------------------------------------------------------------------
  synthesizer-integration-test:
    name: Synthesizer Integration Tests
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies (dev + synthesizer)
        run: poetry install --with dev,synthesizer
      - name: Run synthesizer integration tests
        # ADV-069: Use marker-based routing instead of explicit file list.
        # New synthesizer test files will be auto-included when they carry
        # @pytest.mark.synthesizer / pytestmark = pytest.mark.synthesizer.
        run: |
          poetry run pytest tests/integration/ \
            -m synthesizer \
            -v --no-cov

  # ---------------------------------------------------------------------------
  # SBOM — generate Software Bill of Materials after tests pass
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.python == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Generate CycloneDX SBOM
        run: poetry run cyclonedx-py poetry -o sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Trivy scan — container image vulnerability scan
  #
  # Scans the production Docker image for HIGH and CRITICAL CVEs. Runs after
  # unit tests pass to avoid wasting build time on a broken codebase. This job
  # does NOT block integration-test or sbom — it runs in parallel with them.
  # Fails the pipeline if any HIGH or CRITICAL severity CVE is found, ensuring
  # container vulnerabilities are caught before deployment.
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t conclave-engine:ci-scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: "conclave-engine:ci-scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"


  # ---------------------------------------------------------------------------
  # Smoke test — production Docker image build + basic HTTP assertions
  #
  # Builds the production image and starts the full stack via docker compose,
  # then runs scripts/smoke_test.sh to verify health endpoint, security
  # headers (CSP, X-Content-Type-Options), and basic connectivity.
  #
  # NOTE: This job requires Docker Compose with service dependencies
  # (PostgreSQL, Redis) running in CI. Set continue-on-error: true until
  # the infrastructure is validated. May need runs-on: ubuntu-latest with
  # Docker Compose pre-installed.
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [test, frontend, changes]
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.frontend == 'true'
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Provision CI dummy secrets
        # The docker-compose.yml reads secret values from ./secrets/*.txt files.
        # These files are never committed (.gitignore) and must not exist in CI
        # with real values. Dummy random values are sufficient — the smoke test
        # only validates HTTP reachability and security headers, not data integrity.
        #
        # Why ENV=development (not ENV=production):
        # The smoke test validates Docker image buildability, stack operability,
        # health endpoint reachability, and security headers. Production config
        # validation (JWT_SECRET_KEY, OPERATOR_CREDENTIALS_HASH) is covered by
        # unit tests. Production mode activates HTTPSEnforcementMiddleware
        # (T42.2) which rejects plain HTTP with 421 — incompatible with Docker
        # Compose internal HTTP traffic. Using ENV=development avoids this while
        # still exercising the full stack. The remaining production-required env
        # vars (JWT_SECRET_KEY, OPERATOR_CREDENTIALS_HASH, ARTIFACT_SIGNING_KEY,
        # MASKING_SALT, AUDIT_KEY) are still provisioned so the app starts
        # without warnings in development mode.
        #
        # T47.4 / T47.5: The bcrypt hash below is a dummy CI-only value
        # (hash of "ci-dummy-password", generated offline). The postgres password
        # is fixed (not random) so DATABASE_URL can be constructed
        # deterministically.
        # NOTE: Dollar signs in the bcrypt hash MUST be escaped as $$ in the
        # .env file. Docker Compose treats $ as a variable reference; $$ is
        # the literal $. Without escaping, the hash is silently mangled and
        # validate_config() rejects it at startup.
        run: |
          CI_PG_PASSWORD="ci-dummy-postgres-password-for-smoke-test"
          mkdir -p secrets
          openssl rand -hex 32 > secrets/app_secret_key.txt
          echo "${CI_PG_PASSWORD}" > secrets/postgres_password.txt
          openssl rand -hex 32 > secrets/grafana_admin_password.txt
          echo "ci-admin" > secrets/grafana_admin_user.txt
          openssl rand -hex 16 > secrets/minio_ephemeral_access_key.txt
          openssl rand -hex 32 > secrets/minio_ephemeral_secret_key.txt
          chmod 600 secrets/*.txt
          # Provision .env with all vars required by validate_config().
          # env_file: .env in docker-compose.yml forwards these to the container.
          {
            echo "CONCLAVE_ENV=development"
            echo "DATABASE_URL=postgresql+asyncpg://conclave:${CI_PG_PASSWORD}@pgbouncer:5432/conclave"
            echo "AUDIT_KEY=$(openssl rand -hex 32)"
            echo "ARTIFACT_SIGNING_KEY=$(openssl rand -hex 32)"
            echo "MASKING_SALT=$(openssl rand -hex 32)"
            echo "JWT_SECRET_KEY=$(openssl rand -hex 32)"
            # Auth environment variables required by T47.4/T47.5 config validation.
            # Bcrypt hash of "ci-dummy-password" — dummy value for CI only.
            echo 'OPERATOR_CREDENTIALS_HASH=$$2b$$12$$LJ3m4ys3Lk0TSwHil.mGF.UzMcMeBudDBLzSgIGKjCwBnEMNRKSoi'  # pragma: allowlist secret
          } > .env
          chmod 600 .env

      - name: Run smoke test script
        # smoke_test.sh manages its own full lifecycle: build, start, health
        # wait, HTTP assertions, and teardown via EXIT trap. No redundant
        # inline build/start/teardown steps required.
        run: bash scripts/smoke_test.sh

  # ---------------------------------------------------------------------------
  # Frontend — Lint, Unit Tests (Vitest, 90% coverage), Build
  # Runs after security scan. SHA-pinned actions/setup-node@v6.3.0
  # SHA: 53b83947a5a98c8d113130e565377fae1a50d02f
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Lint, Test, Build)
    runs-on: ubuntu-latest
    needs: [security, changes]
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Audit dependencies
        run: cd frontend && npm audit --audit-level=high

      - name: Type-check
        run: cd frontend && npm run type-check

      - name: Run unit tests with coverage
        run: cd frontend && npm run test:coverage

      - name: Build production bundle
        run: cd frontend && npm run build

      - name: Upload frontend build artifact
        # ADV-062: Share the built dist/ between frontend and e2e jobs so
        # the e2e job does not rebuild the frontend from scratch.
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Playwright E2E tests — full synthesis workflow browser tests
  #
  # ADV-059 drain: wire Playwright E2E tests into CI.
  #
  # Runs after the `frontend` job passes (which builds the production bundle
  # and verifies unit tests). Uses the Vite preview server (already configured
  # in playwright.config.ts) to serve the built app.
  #
  # All API calls are mocked via Playwright's page.route() — the backend is
  # NOT running. This matches the pattern in dashboard.spec.ts and
  # unseal.spec.ts.
  #
  # Playwright binary: Chromium only (matches playwright.config.ts projects).
  # SHA-pinned actions: same SHAs as the `frontend` job above.
  # ---------------------------------------------------------------------------
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend, changes]
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Download frontend build artifact
        # ADV-062: Use the pre-built dist/ from the frontend job instead of
        # rebuilding — eliminates the second full frontend build per CI run.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Playwright browser binaries (Chromium only)
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Shell lint — shellcheck on all hook and script .sh files
  # Runs independently — no Python deps required
  # ---------------------------------------------------------------------------
  shellcheck:
    name: Shell Lint (shellcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        run: |
          find scripts/ frontend/scripts/ .claude/hooks/ -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning

  # ---------------------------------------------------------------------------
  # Docs gate — enforces Constitution Priority 6 (Documentation currency)
  # Every PR branch must contain at least one commit beginning with "docs:"
  # If no documentation was changed, the commit message must be:
  #   docs: no documentation changes required — <one-sentence justification>
  # This gate has no Python dependencies and runs immediately on PR open.
  # ---------------------------------------------------------------------------
  docs-gate:
    name: Documentation Gate (Constitution Priority 6)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify docs commit present on PR branch
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Scanning commits from ${BASE} to ${HEAD} for docs: prefix..."
          DOCS_COMMITS=$(git log "${BASE}..${HEAD}" --format="%s" | grep -c "^docs:" || true)
          if [ "$DOCS_COMMITS" -eq 0 ]; then
            echo ""
            echo "ERROR: No 'docs:' commit found on this PR branch."
            echo ""
            echo "Constitution Priority 6 requires every PR to contain at least one"
            echo "commit beginning with 'docs:'. If no documentation changed, add:"
            echo ""
            echo "  docs: no documentation changes required — <one-sentence justification>"
            echo ""
            echo "See CONSTITUTION.md Section 4 and CLAUDE.md Rule 9."
            exit 1
          fi
          echo "Found ${DOCS_COMMITS} docs: commit(s). Constitution Priority 6: PASS."

  # ---------------------------------------------------------------------------
  # OWASP ZAP Baseline Scan — dynamic application security testing (DAST)
  #
  # Starts the Conclave Engine in SQLite mode, unseals the vault, then runs
  # the ZAP baseline scan against the live API. The baseline scan is
  # informational (fail_action: false) — findings are uploaded as an artifact
  # and visible in the Actions summary but do NOT block merge.
  #
  # Rationale for fail_action: false (P6-T6.2):
  #   The ZAP baseline scan checks for passive OWASP Top 10 issues. Because the
  #   engine runs behind TLS/nginx in production (not raw uvicorn), some ZAP
  #   findings (e.g., missing HSTS on HTTP-only CI) are CI-environment artefacts
  #   rather than real vulnerabilities. All critical findings are mitigated by
  #   CSPMiddleware, SealGate, LicenseGate, and RequestBodyLimitMiddleware.
  #   The scan runs to produce an audit trail — not as a hard gate.
  #
  # Action SHA pinning: zaproxy/action-baseline@v0.15.0
  #   SHA: de8ad967d3548d44ef623df22cf95c3b0baf8b25
  #
  # Artifact upload: handled exclusively by the zaproxy/action-baseline
  # composite action via its artifact_name parameter. A separate
  # actions/upload-artifact step is intentionally absent to avoid a duplicate
  # artifact name collision error (P6-T6.2 DevOps blocker fix).
  # ---------------------------------------------------------------------------
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.python == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Start Conclave Engine (SQLite mode, background)
        env:
          CONCLAVE_ENV: "development"
          DATABASE_URL: "sqlite:///./zap_test.db"
          AUDIT_KEY: "799d2c2130343d4ace9c159dd41dd8367af690f931155c6c1ac56f83380b2b2a"  # pragma: allowlist secret  fictional 32-byte hex key for ZAP CI
          VAULT_SEAL_SALT: "emFwLWNpLXRlc3Qtc2FsdC1maWN0aW9uYWw="  # pragma: allowlist secret  base64("zap-ci-test-salt-fictional")
          HUEY_BACKEND: "memory"
          HUEY_IMMEDIATE: "true"
          LICENSE_KEY: "zap-ci-fictional-license"
        run: |
          poetry run uvicorn synth_engine.bootstrapper.main:app \
            --host 127.0.0.1 --port 8765 --log-level warning &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for API health check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8765/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API is up (attempt $i)."
              exit 0
            fi
            echo "Waiting for API... attempt $i (got $STATUS)"
            sleep 2
          done
          echo "ERROR: API did not become healthy within 60 seconds."
          kill $(cat /tmp/uvicorn.pid) || true
          exit 1

      - name: Unseal vault (fictional test passphrase)
        run: |
          curl -s -X POST http://127.0.0.1:8765/unseal \
            -H "Content-Type: application/json" \
            -d '{"passphrase": "zap-ci-fictional-unseal-passphrase"}' \
            || true  # Unseal may fail if vault is already unsealed — not a gate

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "http://127.0.0.1:8765"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          fail_action: false
          artifact_name: "zap-baseline-report"
        continue-on-error: true

      - name: Stop background API server
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

      - name: Clean up ZAP test database
        # ADV-065: Remove zap_test.db created by DATABASE_URL=sqlite:///./zap_test.db.
        # Prevents stale test DB files accumulating on self-hosted runners.
        if: always()
        run: rm -f zap_test.db
