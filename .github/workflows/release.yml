# .github/workflows/release.yml
#
# Release Engineering — Conclave Engine
#
# Triggered when a `v*` tag is pushed. Produces a GitHub Release with:
#   - Air-gap deployment bundle (conclave-bundle-<version>.tar.gz)
#   - CycloneDX SBOM (sbom.json)
#   - SHA-256 checksums (sha256sums.txt)
#
# Job topology:
#   validate-tag → build-release → publish-release
#
# Supply-chain hardening (T3.5.1 / T51.2): all `uses:` lines are pinned to
# immutable commit SHAs. The SHA comment shows the version tag each SHA
# resolves to. SHAs match the ci.yml pinned versions where the same action is
# reused.
#
# To update an action:
#   gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq '.object.sha'
# then replace both the SHA and the version comment below.

name: Release

on:
  push:
    tags:
      - "v*"

# No global permissions block — all permissions are scoped per-job to
# satisfy the principle of least privilege.

jobs:
  # ---------------------------------------------------------------------------
  # validate-tag — verify tag format and extract version for downstream jobs
  # ---------------------------------------------------------------------------
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      tag: ${{ steps.extract-version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate tag format and extract version
        id: extract-version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Received tag: ${TAG}"

          # Validate: tag must match v<major>.<minor>.<patch> (with optional pre-release)
          # Examples: v1.0.0, v2.3.4-rc.1, v0.1.0-beta.2
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: Tag '${TAG}' does not match semver format v<major>.<minor>.<patch>."
            echo "       Release tags must be of the form v1.2.3 or v1.2.3-rc.1."
            exit 1
          fi

          # Strip leading 'v' to get the bare version string
          VERSION="${TAG#v}"
          echo "Validated version: ${VERSION}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag commit is on main
        # Informational only: release candidates may legitimately be cut from
        # release-prep branches. We warn but do not fail so as not to block RC
        # releases. See T51.2 negative test requirement #1.
        run: |
          TAG="${GITHUB_REF_NAME}"
          COMMIT_SHA="${GITHUB_SHA}"
          echo "Tag ${TAG} points to commit ${COMMIT_SHA}"
          MAIN_COMMITS=$(git log origin/main --format="%H" 2>/dev/null || echo "")
          if echo "${MAIN_COMMITS}" | grep -q "^${COMMIT_SHA}$"; then
            echo "INFO: Tag commit is on main. OK."
          else
            echo "WARNING: Tag commit ${COMMIT_SHA} is not on main."
            echo "         This may be intentional for a release candidate."
          fi

  # ---------------------------------------------------------------------------
  # build-release — build image, air-gap bundle, SBOM, checksums
  # ---------------------------------------------------------------------------
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [validate-tag]
    permissions:
      contents: read

    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
      VERSION: ${{ needs.validate-tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1.4.1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.14-release-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-py3.14-release-

      - name: Install dependencies (dev + synthesizer for SBOM completeness)
        run: poetry install --with dev,synthesizer

      - name: Build Docker image
        run: |
          docker build -t "conclave-engine:${TAG}" .
          docker tag "conclave-engine:${TAG}" "conclave-engine:latest"
          echo "Built image: conclave-engine:${TAG}"
          echo "Tagged as:   conclave-engine:latest"

      - name: Build air-gap bundle
        # build_airgap.sh pulls required images, saves them as .tar files, and
        # compresses everything into conclave-bundle-<version>.tar.gz at the
        # repo root. The VERSION file inside the bundle is set from git-describe.
        run: make build-airgap-bundle

      - name: Generate CycloneDX SBOM
        # --with synthesizer ensures SDV/CTGAN deps appear in the SBOM. Without
        # this flag, the synthesizer group is omitted and the SBOM is incomplete.
        run: poetry run cyclonedx-py poetry --with synthesizer -o sbom.json

      - name: Compute SHA-256 checksums
        run: |
          # Locate the bundle produced by build_airgap.sh (always at repo root)
          BUNDLE=$(ls conclave-bundle-*.tar.gz 2>/dev/null | head -1)
          if [[ -z "${BUNDLE}" ]]; then
            echo "ERROR: No conclave-bundle-*.tar.gz found after make build-airgap-bundle."
            exit 1
          fi
          echo "Bundle: ${BUNDLE}"
          sha256sum "${BUNDLE}" sbom.json > sha256sums.txt
          echo "--- sha256sums.txt ---"
          cat sha256sums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-artifacts-${{ env.VERSION }}
          path: |
            conclave-bundle-*.tar.gz
            sbom.json
            sha256sums.txt
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # publish-release — create GitHub Release and attach all artifacts
  # ---------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release]
    permissions:
      contents: write  # Required: create GitHub Release and upload release assets

    env:
      TAG: ${{ needs.build-release.outputs.tag || needs.validate-tag.outputs.tag }}
      VERSION: ${{ needs.build-release.outputs.version || needs.validate-tag.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-artifacts-${{ needs.validate-tag.outputs.version }}
          path: release-artifacts/

      - name: Prepare release notes
        id: release-notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ -f "RELEASE_NOTES.md" ]]; then
            echo "Using RELEASE_NOTES.md"
            NOTES_FILE="RELEASE_NOTES.md"
          elif [[ -f "CHANGELOG.md" ]]; then
            # Extract the section for this release from CHANGELOG.md.
            # Sections are delimited by lines starting with ## [
            echo "Extracting ${TAG} section from CHANGELOG.md"
            awk "/^## \[${TAG#v}\]|^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
              CHANGELOG.md > release_notes_extracted.md
            if [[ -s release_notes_extracted.md ]]; then
              NOTES_FILE="release_notes_extracted.md"
            else
              echo "No matching section found in CHANGELOG.md — using generic notes."
              echo "Release ${TAG}" > release_notes_generated.md
              NOTES_FILE="release_notes_generated.md"
            fi
          else
            echo "No RELEASE_NOTES.md or CHANGELOG.md found — generating generic notes."
            echo "Release ${TAG}" > release_notes_generated.md
            NOTES_FILE="release_notes_generated.md"
          fi
          echo "notes_file=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        # --verify-tag ensures the tag exists and points to a valid commit.
        # Duplicate tag pushes will cause `gh release create` to fail if a
        # release already exists for that tag (safe by default).
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="${{ steps.release-notes.outputs.notes_file }}"
          echo "Creating release for tag: ${TAG}"
          echo "Release notes from: ${NOTES_FILE}"
          ls -la release-artifacts/
          gh release create "${TAG}" \
            --title "Conclave ${TAG}" \
            --notes-file "${NOTES_FILE}" \
            --verify-tag \
            release-artifacts/conclave-bundle-*.tar.gz \
            release-artifacts/sbom.json \
            release-artifacts/sha256sums.txt
