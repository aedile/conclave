---
# =============================================================================
# docker-compose.yml — Base production service definitions
#
# This file describes the minimum required services for a production-equivalent
# deployment.  It is intentionally sparse: dev-only services (Jaeger, MinIO,
# Uvicorn hot-reload) live in docker-compose.override.yml.
#
# Security hardening applied here (Task 1.6):
#   - read_only: true              — immutable container rootfs
#   - tmpfs for /tmp, /run/secrets — writable scratch space without persistent
#                                    storage on the rootfs
#   - cap_drop: ALL + cap_add selective — least-privilege capability model
#   - no-new-privileges security opt  — prevents privilege escalation via SUID
#   - Docker secrets skeleton          — secrets injected at runtime, not baked in
#   - Log rotation                     — bounded disk usage for json-file logs
#
# Task 2.2 additions:
#   - postgres service with LUKS-intended named volume and Docker secret password
#   - pgbouncer in transaction-pool mode for connection multiplexing
#   - pgbouncer/userlist.txt mounted read-only for authenticated connections
#   - internal bridge network isolating data-plane traffic
#
# Task 2.4 additions:
#   - prometheus — Prometheus metrics scraper (scrapes /metrics from app:8000)
#   - alertmanager — Alert routing (dev: null receiver, no external notifications)
#   - grafana — Dashboard visualisation (admin password via Docker secret)
#
# Task T4.1 additions:
#   - app: NVIDIA Container Toolkit GPU passthrough via deploy.resources.reservations
#   - minio-ephemeral — dedicated MinIO bucket backed by tmpfs for synthesis artifacts
#     Privacy mandate: all training artifacts evaporate on container stop.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — Conclave Engine (Synthetic Data Generation API)
  # ---------------------------------------------------------------------------
  app:
    image: conclave-engine:latest
    build:
      context: .
      dockerfile: Dockerfile

    # --- Capability model: drop all, re-add only what is required ------------
    # IPC_LOCK: allows mlock(2) so cryptographic key material is never swapped
    #           to disk — required for DP-SGD key management and Vault integration.
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK

    # --- Security options ----------------------------------------------------
    security_opt:
      - no-new-privileges:true

    # --- Immutable rootfs (Task 1.6) -----------------------------------------
    read_only: true

    # --- Writable scratch areas (tmpfs so nothing persists to the rootfs) ----
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run/secrets:size=4m,mode=0700

    # --- Runtime secrets (placeholder; files must exist before `up`) ---------
    secrets:
      - app_secret_key

    # --- Persistent named volumes --------------------------------------------
    volumes:
      - chroma_data:/app/.chroma_data

    # --- NVIDIA Container Toolkit GPU passthrough (T4.1) ----------------------
    # Uses the current `deploy.resources.reservations.devices` spec.
    # The deprecated `runtime: nvidia` field is intentionally NOT used.
    # FORCE_CPU=true in the environment bypasses GPU access for CI and
    # development machines without NVIDIA hardware.
    #
    # To disable GPU passthrough entirely (e.g. CPU-only hosts), remove this
    # `deploy` block or set FORCE_CPU=true in the app environment.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

    # --- Log rotation (Task 1.6) ---------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    ports:
      - "8000:8000"

    networks:
      - internal

    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # redis — Ephemeral task queue backing store for Huey (Phase 4+)
  #
  # Security notes:
  #   - No external port exposure: only app can reach Redis via the internal
  #     Docker network.
  #   - Persistence disabled (--save "" --appendonly no): Redis holds only
  #     transient job state; no sensitive data is written to disk.
  #   - read_only rootfs + tmpfs: same hardening as app service.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    # No ports: intentionally internal-only
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    networks:
      - internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # postgres — Primary relational store (Task 2.2)
  #
  # Security notes:
  #   - Password injected via Docker secret (file never committed to VCS).
  #   - Named volume postgres_data MUST reside on a LUKS-encrypted host volume
  #     in production deployments.
  #   - No external port exposure: only app and pgbouncer reach Postgres via
  #     the internal bridge network.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conclave
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: conclave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conclave"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # pgbouncer — Connection pooler in transaction mode (Task 2.2)
  #
  # Sits between app and postgres.  Transaction pooling means a server
  # connection is only held for the duration of a transaction, drastically
  # reducing idle connection overhead in high-concurrency workloads.
  #
  # Security notes:
  #   - No external port exposure: only accessible via the internal network.
  #   - Credentials sourced from environment variables populated at runtime.
  #   - PGBOUNCER_AUTH_TYPE and PGBOUNCER_AUTH_FILE enforce authenticated
  #     connections; unauthenticated access is denied (lateral movement risk
  #     mitigation — DevOps review finding P2-T2.2).
  #   - userlist.txt is mounted read-only; replace plaintext password with
  #     SCRAM-SHA-256 hashes for production deployments.
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: pgbouncer/pgbouncer:1.23.1
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_USER: conclave
      DATABASES_DBNAME: conclave
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "100"
      PGBOUNCER_DEFAULT_POOL_SIZE: "10"
      PGBOUNCER_AUTH_TYPE: md5
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
    volumes:
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # prometheus — metrics scraper (Task 2.4)
  #
  # Scrapes /metrics from app:8000 every 15 seconds.  The prometheus_data
  # volume persists TSDB samples between restarts.
  #
  # Security notes:
  #   - No external port exposure: only accessible via the internal network.
  #   - /metrics endpoint is unauthenticated by design (internal-only);
  #     network-level protection is documented in ADR-0011.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # alertmanager — alert routing (dev: null receiver) (Task 2.4)
  #
  # Routes Prometheus alerts.  In development the null receiver discards all
  # alerts.  Replace with PagerDuty / Slack receivers for production.
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # grafana — dashboard visualisation (Task 2.4)
  #
  # Security notes:
  #   - Admin password injected via Docker secret (grafana_admin_password).
  #   - Admin username injected via Docker secret (grafana_admin_user) so
  #     the default "admin" username is not used — DevOps review finding P2-T2.4.
  #   - Anonymous access and sign-up are explicitly disabled.
  #   - Dashboard and datasource provisioning is read-only mounted.
  #   - grafana_data volume persists dashboards / plugins between restarts.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SECURITY_ADMIN_USER__FILE: /run/secrets/grafana_admin_user
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    secrets:
      - grafana_admin_password
      - grafana_admin_user
    ports:
      - "3000:3000"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # minio-ephemeral — Ephemeral MinIO bucket for synthesis artifacts (T4.1)
  #
  # Privacy mandate: training artifacts (Parquet files and checkpoints) MUST
  # NOT survive container termination.  This service achieves that by:
  #   1. Using tmpfs for the /data directory — data is stored only in RAM and
  #      evaporates the moment the container stops.
  #   2. NOT defining a named Docker volume for /data — no persistence path.
  #
  # The `synth-ephemeral` bucket is created automatically by the mc (MinIO
  # client) init container or by EphemeralStorageClient on first use.
  #
  # Security notes:
  #   - Credentials injected via Docker secrets, not environment variables
  #     baked into the image.
  #   - No external port exposure: only the app service reaches this endpoint
  #     via the internal bridge network.
  #   - tmpfs size is bounded at 4 GB to prevent runaway synthesis jobs from
  #     exhausting host memory.
  # ---------------------------------------------------------------------------
  minio-ephemeral:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    command: server /data --console-address ":9091"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # /data is tmpfs-backed: all synthesis artifacts evaporate on container stop.
    # size=4g: bounded ceiling to prevent OOM from runaway synthesis jobs.
    tmpfs:
      - /data:size=4g,mode=0700
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_ephemeral_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_ephemeral_secret_key
    secrets:
      - minio_ephemeral_access_key
      - minio_ephemeral_secret_key
    # No ports: intentionally internal-only — the app service connects via
    # the internal bridge network at http://minio-ephemeral:9000.
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
    restart: unless-stopped

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  # chroma_data: persists the ChromaDB vector store between container restarts.
  # For production deployments the host path MUST reside on a LUKS-encrypted
  # volume — see docs/infrastructure_security.md.
  chroma_data:

  # postgres_data: persists PostgreSQL WAL and data files.
  # For production deployments the host path MUST reside on a LUKS-encrypted
  # volume — see docs/infrastructure_security.md.
  postgres_data:

  # prometheus_data: persists Prometheus TSDB samples between container restarts.
  prometheus_data:

  # grafana_data: persists Grafana dashboards, plugins, and user state.
  grafana_data:

# =============================================================================
# Networks
# =============================================================================
networks:
  # internal: isolated bridge network — no external ingress except via the
  # app service's published port.  All inter-service traffic is confined here.
  internal:
    driver: bridge

# =============================================================================
# Docker secrets skeleton
#
# Secret files are NEVER committed to git (see .gitignore: secrets/*.txt).
# Before running `docker-compose up` on a fresh host, provision the files:
#   mkdir -p secrets
#   openssl rand -hex 32 > secrets/app_secret_key.txt
#   openssl rand -hex 32 > secrets/postgres_password.txt
#   openssl rand -hex 32 > secrets/grafana_admin_password.txt
#   echo "conclave-admin" > secrets/grafana_admin_user.txt
#   openssl rand -hex 16 > secrets/minio_ephemeral_access_key.txt
#   openssl rand -hex 32 > secrets/minio_ephemeral_secret_key.txt
#   chmod 600 secrets/app_secret_key.txt secrets/postgres_password.txt \
#             secrets/grafana_admin_password.txt secrets/grafana_admin_user.txt \
#             secrets/minio_ephemeral_access_key.txt \
#             secrets/minio_ephemeral_secret_key.txt
# =============================================================================
secrets:
  app_secret_key:
    file: ./secrets/app_secret_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  grafana_admin_user:
    file: ./secrets/grafana_admin_user.txt
  minio_ephemeral_access_key:
    file: ./secrets/minio_ephemeral_access_key.txt
  minio_ephemeral_secret_key:
    file: ./secrets/minio_ephemeral_secret_key.txt
