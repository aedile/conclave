# alembic.ini — Alembic migration configuration for the Conclave Engine.
#
# The database URL uses Python's %(VAR)s interpolation to source credentials
# from environment variables at runtime.  No credentials are stored here.
#
# CONSTITUTION Priority 0: Security — credentials via env vars only.
# Task: P2-T2.2 — Secure Database Layer

[alembic]
# Path to the migration scripts
script_location = alembic

# Template for generating revision filenames: <date>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Truncate the slug to avoid excessively long filenames
truncate_slug_length = 40

# Database URL — sourced exclusively from environment variables.
# Provision these before running `alembic upgrade head`:
#   export DB_USER=conclave
#   export DB_PASSWORD=$(cat secrets/postgres_password.txt)
#   export DB_HOST=localhost
#   export DB_PORT=5432
#   export DB_NAME=conclave
sqlalchemy.url = postgresql+psycopg2://%(DB_USER)s:%(DB_PASSWORD)s@%(DB_HOST)s:%(DB_PORT)s/%(DB_NAME)s

[post_write_hooks]
# No post-write hooks configured; add ruff formatting here if desired.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
