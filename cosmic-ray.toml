# cosmic-ray.toml — Mutation Testing Configuration (T53.1)
#
# ADR-0054: cosmic-ray 8.4.4 adopted as the mutation testing tool for CPython 3.14.
# ADR-0047: Initial threshold 60%, targeting 70% by Phase 55.
#
# Scope: security-critical modules only.
#   - src/synth_engine/shared/security/  (vault, audit, HMAC, ALE, rotation, etc.)
#   - src/synth_engine/modules/privacy/  (epsilon/delta accountant, DP engine, ledger)
#
# __init__.py files are excluded via excluded-modules glob patterns: they contain
# only re-exports and produce noise mutations without testing real behavior.
#
# Distributor: "local" — subprocess-per-mutant isolation avoids the SIGSEGV that
# afflicted mutmut 3.x's in-process trampoline on CPython 3.14 (see ADR-0052, ADR-0054).
#
# Timeout: 10 seconds per mutant. The test suite is fast (unit tests, no I/O).
# If a mutant causes an infinite loop, it is killed after 10 seconds.
# (Reduced from 30s: 30s x 789 mutants = worst-case 395 min; 10s = 131 min worst-case.
#
# test-command: runs the full unit test suite against each mutant. Integration
# tests are excluded (they require PostgreSQL and take minutes each). The --no-cov
# flag disables coverage collection during mutation runs for speed.
#
# Speed optimization: -x (exit on first failure) means most killed mutants exit in
# <1 second — the first relevant test that catches the mutation fails immediately and
# pytest stops. Without -x, all 17 test files run to completion for every mutant.
# With -x, the median mutant is caught by the first 1-2 relevant tests, reducing
# wall-clock time from ~60 minutes to ~5-10 minutes for a full 795-mutant run.
#
# Note: module-path is a FILESYSTEM PATH (directory or file), not a Python module name.
# cosmic-ray 8.4.4 calls Path(module-path).exists() to resolve targets.
#
# excluded-modules patterns: cosmic-ray resolves these via glob.glob(pattern, recursive=True)
# relative to the working directory (project root). Patterns must use forward slashes.
# The ** wildcard requires recursive=True (always active in cosmic-ray 8.4.4).
#
# Fix (T53.1 advisory drain): The original config excluded bootstrapper/ and the other
# modules/ directories but missed the non-security files in shared/. This caused
# cosmic-ray to generate 1,260+ mutants instead of the expected ~200-400 for the
# 10 target files (7 in shared/security/, 3 in modules/privacy/). All non-security
# shared/ files are now explicitly excluded.

[cosmic-ray]
module-path = "src/synth_engine"
python-version = ""
timeout = 10
excluded-modules = [
    # Exclude trivial __init__.py re-export files — mutations here produce noise
    "src/synth_engine/__init__.py",
    "src/synth_engine/shared/__init__.py",
    "src/synth_engine/shared/security/__init__.py",
    "src/synth_engine/modules/__init__.py",
    "src/synth_engine/modules/privacy/__init__.py",
    # Exclude all non-security-critical modules from mutation scope.
    # These are included via module-path to allow import resolution but
    # must not receive mutations (per ADR-0047 scope mandate).
    "src/synth_engine/bootstrapper/**/*.py",
    "src/synth_engine/modules/ingestion/**/*.py",
    "src/synth_engine/modules/mapping/**/*.py",
    "src/synth_engine/modules/masking/**/*.py",
    "src/synth_engine/modules/profiler/**/*.py",
    "src/synth_engine/modules/subsetting/**/*.py",
    "src/synth_engine/modules/synthesizer/**/*.py",
    # Exclude non-security shared/ files.
    # ADR-0047 scope is shared/security/ ONLY — all other shared/ code is
    # infrastructure (DB, settings, telemetry, middleware) excluded from mutation.
    "src/synth_engine/shared/cert_metrics.py",
    "src/synth_engine/shared/db.py",
    "src/synth_engine/shared/errors.py",
    "src/synth_engine/shared/exceptions.py",
    "src/synth_engine/shared/protocols.py",
    "src/synth_engine/shared/schema_topology.py",
    "src/synth_engine/shared/settings.py",
    "src/synth_engine/shared/ssrf.py",
    "src/synth_engine/shared/task_queue.py",
    "src/synth_engine/shared/telemetry.py",
    "src/synth_engine/shared/middleware/**/*.py",
    "src/synth_engine/shared/tasks/**/*.py",
    "src/synth_engine/shared/tls/**/*.py",
]
# -x: exit on first failure — kills most mutants in <1s instead of running all files.
# -q --tb=no --no-header: suppress output noise per mutant subprocess.
# --no-cov: skip coverage instrumentation — not needed during mutation runs.
# -p no:randomly: disable test shuffling for deterministic per-mutant output.
#
# ADV-P53-03 (drain): P55 security test files are automatically included
# because the command targets tests/unit/ (the full directory). New files added
# in P55: test_vault_health.py, test_model_artifact_security.py,
# test_audit_chain_continuity.py, test_ssrf_fail_closed.py,
# test_dead_dependency_cleanup.py — all verified present.
test-command = "python -m pytest tests/unit/ -x -q --tb=no --no-header --no-cov -p no:randomly"

[cosmic-ray.distributor]
name = "local"
