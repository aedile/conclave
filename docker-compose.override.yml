---
# =============================================================================
# docker-compose.override.yml — Local developer experience overrides
#
# This file is automatically merged by Docker Compose when both this file and
# docker-compose.yml are present.  It is intentionally NOT committed as part
# of a production deployment.
#
# What this file adds:
#   app     — bind-mount src/ for hot-reload; Uvicorn --reload flag
#   jaeger  — distributed tracing UI + OTLP collector  (profile: dev)
#   minio   — S3-compatible object storage for local testing (profile: dev)
#
# Usage:
#   docker-compose up                    # starts app only
#   docker-compose --profile dev up      # starts app + jaeger + minio
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — override for hot-reload development
  # ---------------------------------------------------------------------------
  app:
    # Bind-mount the source tree read-only so Uvicorn's file watcher picks up
    # changes without rebuilding the image.  The :ro flag prevents the container
    # from accidentally writing back to the host source tree.
    volumes:
      - ./src:/app/src:ro
      - chroma_data:/app/.chroma_data

    # Override CMD to enable Uvicorn's --reload flag.
    command:
      - poetry
      - run
      - uvicorn
      - synth_engine.bootstrapper.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload

    # In development the read-only rootfs is relaxed so the Poetry environment
    # cache and Uvicorn can write to the container.
    read_only: false

  # ---------------------------------------------------------------------------
  # jaeger — distributed tracing (profile: dev)
  #
  # Provides the Jaeger all-in-one image which includes the collector, query,
  # and UI in a single container.  The engine emits OTLP traces to port 4317.
  #
  # UI: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles:
      - dev
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # minio — S3-compatible local object storage (profile: dev)
  #
  # Used to simulate the air-gap artifact store during local development.
  # Credentials are set via env_file so they are never baked into source control.
  #
  # Console: http://localhost:9001
  # API:     http://localhost:9000
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    profiles:
      - dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    env_file:
      - .env.dev
    volumes:
      - minio_data:/data
    restart: unless-stopped

# =============================================================================
# Additional volumes used only in development
# =============================================================================
volumes:
  chroma_data:
  minio_data:
